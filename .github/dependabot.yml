version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      nextjs-runtime:
        patterns:
          - "next"
          - "react"
          - "react-dom"
      cloudflare-runtime:
        patterns:
          - "@opennextjs/cloudflare"
          - "wrangler"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
